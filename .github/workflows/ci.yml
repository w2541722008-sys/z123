name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run unit & contract tests with coverage
      run: |
        cd backend
        python -m pytest ../tests/ -v \
          --ignore=../tests/test_frontend_utils.js \
          --ignore=../tests/check_admin_actions.js \
          --ignore=../tests/integration \
          --cov=. \
          --cov-report=term-missing \
          --cov-fail-under=50
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}

    - name: Run integration tests (if DB available)
      run: |
        cd backend
        python -m pytest ../tests/integration/ -v -m integration --timeout=60 || echo "Integration tests skipped (no DB)"
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install backend dependencies and lint tools
      run: |
        cd backend
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Check code formatting with Black
      run: |
        black --check --diff backend/ tests/

    - name: Run ruff linter
      run: |
        ruff check backend/ tests/

    - name: Run mypy type check (strict modules only)
      run: |
        cd backend
        pip install mypy types-psycopg2
        mypy --config-file mypy.ini \
          --follow-imports=skip \
          constants/__init__.py constants/mood.py constants/story_phase.py \
          utils/json_utils.py \
          services/token_budget.py services/usage_guard.py services/rate_limit.py services/cache_service.py

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Run frontend tests
      run: |
        node tests/check_admin_actions.js --strict --allow-list=tests/admin_action_allowlist.json
        node tests/test_frontend_utils.js

  deploy-check:
    name: Deploy Check
    runs-on: ubuntu-latest
    needs: [test, lint, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate deployment scripts
      run: |
        chmod +x deploy.sh restart.sh
        echo "Deployment scripts validated"

    - name: Check required files exist
      run: |
        ls -la backend/main.py backend/requirements.txt index.html
