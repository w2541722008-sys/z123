name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run unit & contract tests with coverage
      run: |
        cd backend
        python -m pytest ../tests/unit ../tests/service_flows ../tests/api ../tests/contracts -v \
          --cov=. \
          --cov-report=term-missing \
          --cov-report=json \
          --cov-fail-under=0
        python ../scripts/check_coverage.py
        python ../scripts/test_quality_report.py
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/aifriend_test

    - name: Run integration tests (if DB available)
      run: |
        cd backend
        if [ -z "${TEST_DATABASE_URL:-}" ]; then
          echo "TEST_DATABASE_URL not set; skipping integration tests."
          exit 0
        fi
        python -m pytest ../tests/integration/ -v -m integration --timeout=60
      env:
        TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        DATABASE_URL: postgresql://test:test@localhost:5432/aifriend_test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install backend dependencies and lint tools
      run: |
        cd backend
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run ruff linter
      run: |
        cd backend
        ruff check .

    - name: Run mypy type check (strict modules only)
      run: |
        cd backend
        mypy --config-file mypy.ini

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Run frontend tests
      run: |
        node tests/frontend/frontend_smoke.js
        node tests/frontend/check_csp_onclick.js
        node tests/frontend/test_frontend_security.js
        node tests/frontend/check_admin_actions.js --strict --allow-list=tests/frontend/admin_action_allowlist.json
        node tests/frontend/test_frontend_utils.js

  deploy-check:
    name: Deploy Check
    runs-on: ubuntu-latest
    needs: [test, lint, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate deployment scripts
      run: |
        chmod +x deploy.sh restart.sh
        bash -n deploy.sh
        bash -n restart.sh
        bash -n rollback.sh
        bash -n deploy/backup_supabase.sh
        python -m pytest tests/ops/test_deploy_scripts.py -q

    - name: Check required files exist
      run: |
        ls -la backend/main.py backend/requirements.txt index.html
