# AIFriend 日志轮转配置
# 安装：sudo cp logrotate.conf /etc/logrotate.d/aifriend
# 测试：sudo logrotate --debug /etc/logrotate.d/aifriend

/var/log/aifriend.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 50M
    dateext
    dateformat -%Y%m%d
}
