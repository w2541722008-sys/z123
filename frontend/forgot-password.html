<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>忘记密码 - Lunar</title>
  <style>
    /* 忘记密码页面专用样式（冷色调） */
    .forgot-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at top right, rgba(129,140,248,.10), transparent 30%),
        radial-gradient(circle at bottom left, rgba(167,139,250,.08), transparent 28%),
        linear-gradient(135deg, #0a0a14 0%, #0f0f1e 50%, #141425 100%);
    }
    
    .forgot-card {
      width: 100%;
      max-width: 400px;
      background: rgba(15, 15, 30, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(167, 139, 250, 0.12);
    }
    
    .forgot-header {
      text-align: center;
      margin-bottom: 28px;
    }
    
    .forgot-title {
      font-size: 24px;
      font-weight: 600;
      color: #e8ecf8;
      margin-bottom: 8px;
    }
    
    .forgot-subtitle {
      font-size: 14px;
      color: #8b92b0;
    }
    
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(129, 140, 248, 0.25);
      transition: all 0.3s ease;
    }
    
    .step-dot.active {
      background: #818cf8;
      width: 24px;
      border-radius: 4px;
    }
    
    .step-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    .step-content.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-label {
      display: block;
      font-size: 14px;
      color: #8b92b0;
      margin-bottom: 8px;
    }
    
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #e8ecf8;
      font-size: 15px;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    
    .input-field:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
    }
    
    .input-field.error {
      border-color: #EF4444;
    }
    
    .input-field:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error-message {
      color: #EF4444;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .btn {
      width: 100%;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #a78bfa 0%, #818cf8 100%);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -5px rgba(129, 140, 248, 0.4);
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn-ghost {
      background: transparent;
      color: #8b92b0;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .btn-ghost:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.04);
      color: #e8ecf8;
    }
    
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    .btn-row .btn {
      flex: 1;
    }
    
    .code-inputs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .code-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      background: rgba(10, 10, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #e8ecf8;
      transition: all 0.2s ease;
    }
    
    .code-input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
    }
    
    .code-input.filled {
      border-color: #10B981;
      background: rgba(16, 185, 129, 0.08);
    }
    
    .resend-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 14px;
    }
    
    .resend-text {
      color: #8b92b0;
    }
    
    .resend-btn {
      color: #a78bfa;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 0;
      font-family: inherit;
    }
    
    .resend-btn:disabled {
      color: #4a5072;
      cursor: not-allowed;
    }
    
    .success-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #8b92b0;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s ease;
    }
    
    .back-link a:hover {
      color: #e8ecf8;
    }
    
    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .password-strength {
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      transition: all 0.3s ease;
      width: 0;
    }
    
    .password-strength-bar.weak {
      width: 33%;
      background: #EF4444;
    }
    
    .password-strength-bar.medium {
      width: 66%;
      background: #F59E0B;
    }
    
    .password-strength-bar.strong {
      width: 100%;
      background: #10B981;
    }

    /* Toast 提示（独立页面内联） */
    .ui-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(16, 20, 36, .95);
      color: #e8ecf8;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .10);
      backdrop-filter: blur(12px);
      z-index: 210;
      opacity: 0;
      transition: opacity .22s ease, transform .22s ease;
      pointer-events: none;
      white-space: nowrap;
      max-width: min(320px, 90vw);
      text-align: center;
    }
    .ui-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="forgot-page">
    <div class="forgot-card">
      <div class="forgot-header">
        <div class="forgot-title">忘记密码</div>
        <div class="forgot-subtitle" id="step-subtitle">输入邮箱获取验证码</div>
      </div>
      
      <!-- 步骤指示器 -->
      <div class="step-indicator">
        <div class="step-dot active" data-step="1"></div>
        <div class="step-dot" data-step="2"></div>
        <div class="step-dot" data-step="3"></div>
      </div>
      
      <!-- 步骤 1: 输入邮箱 -->
      <div class="step-content active" id="step-1">
        <div class="input-group">
          <label class="input-label">注册邮箱</label>
          <input 
            type="email" 
            class="input-field" 
            id="email-input" 
            placeholder="请输入您的注册邮箱"
            autocomplete="email"
          />
          <div class="error-message" id="email-error"></div>
        </div>
        
        <button class="btn btn-primary" id="send-code-btn" onclick="ForgotPassword.sendCode()">
          发送验证码
        </button>
        
        <div class="back-link">
          <a href="/">← 返回登录</a>
        </div>
      </div>
      
      <!-- 步骤 2: 输入验证码 -->
      <div class="step-content" id="step-2">
        <div class="input-group">
          <label class="input-label">输入 6 位验证码</label>
          <div class="code-inputs">
            <input type="text" class="code-input" maxlength="1" data-index="0" />
            <input type="text" class="code-input" maxlength="1" data-index="1" />
            <input type="text" class="code-input" maxlength="1" data-index="2" />
            <input type="text" class="code-input" maxlength="1" data-index="3" />
            <input type="text" class="code-input" maxlength="1" data-index="4" />
            <input type="text" class="code-input" maxlength="1" data-index="5" />
          </div>
          <div class="error-message" id="code-error"></div>
        </div>
        
        <button class="btn btn-primary" id="verify-code-btn" onclick="ForgotPassword.verifyCode()">
          验证
        </button>
        
        <div class="resend-row">
          <span class="resend-text">没有收到？</span>
          <button class="resend-btn" id="resend-btn" onclick="ForgotPassword.resendCode()">
            重新发送
          </button>
        </div>
        
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="ForgotPassword.goToStep(1)">上一步</button>
        </div>
      </div>
      
      <!-- 步骤 3: 设置新密码 -->
      <div class="step-content" id="step-3">
        <div class="input-group">
          <label class="input-label">新密码</label>
          <input 
            type="password" 
            class="input-field" 
            id="new-password-input" 
            placeholder="至少 6 位字符"
            oninput="ForgotPassword.checkPasswordStrength()"
          />
          <div class="password-strength">
            <div class="password-strength-bar" id="strength-bar"></div>
          </div>
        </div>
        
        <div class="input-group">
          <label class="input-label">确认新密码</label>
          <input 
            type="password" 
            class="input-field" 
            id="confirm-password-input" 
            placeholder="再次输入新密码"
          />
          <div class="error-message" id="password-error"></div>
        </div>
        
        <button class="btn btn-primary" id="reset-password-btn" onclick="ForgotPassword.resetPassword()">
          重置密码
        </button>
        
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="ForgotPassword.goToStep(2)">上一步</button>
        </div>
      </div>
      
      <!-- 步骤 4: 成功 -->
      <div class="step-content" id="step-4">
        <div class="success-icon">✓</div>
        <div class="forgot-title">重置成功</div>
        <div class="forgot-subtitle">您的密码已重置，请使用新密码登录</div>
        
        <button class="btn btn-primary" onclick="window.location.href='/'" style="margin-top: 24px;">
          去登录
        </button>
      </div>
    </div>
  </div>
  
  <!-- Toast 提示 -->
  <div class="ui-toast" id="ui-toast"></div>
  
  <script src="frontend/forgot-password.js"></script>
</body>
</html>
