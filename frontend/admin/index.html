<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>角色卡管理后台</title>
<link rel="icon" href="/api/frontend/assets/default-avatar.png" type="image/png">
<link rel="stylesheet" href="/api/frontend/admin/style.css?v=20260504a">
</head>
<body>
<div class="topbar">
  <button class="hamburger-btn d-none" id="hamburger-btn" data-action="toggle-mobile-sidebar" title="菜单">☰</button>
  <h1>🎭 管理后台</h1>
  <div class="topbar-nav" id="topbar-system-nav">
    <button class="topbar-link back-to-chars d-none" id="back-to-chars-btn" data-action="back-to-chars">← 角色</button>
    <button class="topbar-link" data-action="switch-system-tab" data-tab="dashboard">📊 仪表盘</button>
    <button class="topbar-link" data-action="switch-system-tab" data-tab="membership">👥 会员</button>
    <button class="topbar-link" data-action="switch-system-tab" data-tab="auditlog">🧾 日志</button>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost" data-action="load-char-list">🔄 刷新列表</button>
  </div>
</div>
<div class="layout">
  <!-- 左侧角色列表 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>角色列表 <span id="char-count" class="char-count-badge">0</span></span>
      <button class="btn btn-primary btn-sm" data-action="open-create-char-modal">+ 新建</button>
    </div>
    <div class="sidebar-filters">
      <input type="search" id="char-filter-search" placeholder="搜索名称/ID…" class="input-search" />
      <div class="sidebar-filter-row">
        <select id="char-filter-visible" class="input-select">
          <option value="all">全部可见性</option>
          <option value="visible">仅可见</option>
          <option value="hidden">仅隐藏</option>
        </select>
        <select id="char-filter-type" class="input-select">
          <option value="all">全部类型</option>
          <option value="intimate">对话陪伴</option>
          <option value="scenario">剧情沙盒</option>
        </select>
        <select id="char-filter-plan" class="input-select">
          <option value="all">全部档位</option>
          <option value="guest">游客可访问</option>
          <option value="free">注册用户</option>
          <option value="vip">仅VIP</option>
          <option value="svip">仅SVIP</option>
        </select>
      </div>
    </div>
    <div id="char-list">
      <div class="empty-state"><div class="icon">⏳</div><div>加载中...</div></div>
    </div>
  </div>

  <!-- 右侧主内容 -->
  <div class="main">
    <div id="breadcrumb" class="breadcrumb"></div>
    <!-- 角色标签页面板（由内联脚本注入） -->
    <div id="partial-char-panels"></div>

    <!-- 系统标签页面板（由内联脚本注入） -->
    <div id="partial-system-panels"></div>
  </div>
</div>

<!-- 悬浮保存按钮（选中角色后出现，固定右下角） -->
<div id="fab-save" class="d-none">
  <button type="button" data-action="save-char" title="保存修改">💾</button>
  <span class="fab-label" id="fab-label">保存</span>
</div>

<!-- 弹窗模板（由内联脚本注入） -->
<div id="partial-modals"></div>

<!-- 侧边栏遮罩（移动端） -->
<div class="sidebar-backdrop" id="sidebar-backdrop" data-action="toggle-mobile-sidebar"></div>

<div id="toast"></div>

<!-- ============ 内联脚本：在所有模块之前同步注入 HTML 模板 ============ -->
<script>
(function() {
  var partials = ['char-panels', 'system-panels', 'modals'];
  var base = '/api/frontend/admin/partials/';
  for (var i = 0; i < partials.length; i++) {
    var name = partials[i];
    var xhr = new XMLHttpRequest();
    xhr.open('GET', base + name + '.html', false);
    try { xhr.send(); } catch (e) { console.error('加载模板失败: ' + name, e); continue; }
    if (xhr.status === 200) {
      var target = document.getElementById('partial-' + name);
      if (target) target.innerHTML = xhr.responseText;
    }
  }
})();
</script>

<!-- JS 模块加载 -->
<script src="/api/frontend/admin/js/utils.js?v=20260504a"></script>
<script src="/api/frontend/shared/shared-utils.js?v=2"></script>
<script src="/api/frontend/admin/js/config.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/api.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/state.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/char-editor-affection.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/char-editor.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/char-advanced.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/prompt-preview.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/membership.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/dashboard.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/audit-log.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/normalizers.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/overview.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/char-list.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/char-crud.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/bootstrap.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/actions.js?v=20260504a"></script>
<script src="/api/frontend/admin/js/main.js?v=20260504a"></script>
</body>
</html>
