# AIFriend Pre-commit Hooks
# 安装：pip install pre-commit && pre-commit install
# 手动运行：pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: ['--fix']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ['--config-file=backend/mypy.ini']
        additional_dependencies:
          - types-psycopg2
        files: ^backend/

  - repo: local
    hooks:
      - id: fast-tests
        name: Fast unit tests
        entry: bash -c 'cd backend && python -m pytest ../tests/unit/ -x -q -n auto -m "not slow" --tb=line'
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
