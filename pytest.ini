[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -m "not integration and not e2e"
filterwarnings =
    ignore:'asyncio\.iscoroutinefunction' is deprecated and slated for removal in Python 3\.16; use inspect\.iscoroutinefunction\(\) instead:DeprecationWarning:fastapi\.routing
markers =
    slow: 耗时 > 2s 的测试（CI 完整运行，pre-commit 跳过）
    fast: 耗时 < 200ms 的测试（适合 pre-commit 钩子）
    integration: 需要真实 PostgreSQL 数据库的集成测试
    e2e: 全栈端到端测试（手动或按需执行）
    security: 安全相关测试
    unit: 纯函数单元测试（无 DB、无 HTTP、无 I/O）
    service: 服务层测试（Mock DB）
    api: 路由集成测试（TestClient + Mock DB）
    smoke: 快速冒烟检查（部署门禁专用）
