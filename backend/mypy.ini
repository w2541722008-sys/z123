[mypy]
# AIFriend mypy 渐进式配置
#
# 策略：
#   1. CI 只检查"已声明严格"的模块（通过下方 overrides 列表）
#   2. 新模块应在列表中注册，旧模块逐步补全类型后加入
#   3. 全量 mypy 检查可在本地手动运行：mypy --config-file mypy.ini .
#
# 当前严格模块：constants.*, utils.json_utils, services.token_budget,
#               services.usage_guard, services.rate_limit, services.cache_service

python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_any_generics = False
check_untyped_defs = True

# 第三方库缺少 stub 时忽略
[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-psycopg2.extras.*]
ignore_missing_imports = True

[mypy-psycopg2.pool.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-starlette.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-bcrypt.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

# 已完成严格标注的模块 — 新代码应加入此列表
[mypy-constants.*]
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-utils.json_utils]
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-services.token_budget]
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-services.usage_guard]
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-services.rate_limit]
disallow_untyped_defs = True
disallow_any_generics = True

[mypy-services.cache_service]
disallow_untyped_defs = True
disallow_any_generics = True
