[pytest]
testpaths = ../tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -m "not integration"
filterwarnings =
    ignore:'asyncio\.iscoroutinefunction' is deprecated and slated for removal in Python 3\.16; use inspect\.iscoroutinefunction\(\) instead:DeprecationWarning:fastapi\.routing
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests requiring real DB (deselect with '-m "not integration"')
    security: marks tests as security-related
    unit: marks pure unit tests (no DB, no external deps)
