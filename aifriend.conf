server {
    listen 80;
    server_name lunawhisp.com www.lunawhisp.com 45.76.182.245;

    # HTTP → HTTPS redirect
    return 301 https://lunawhisp.com$request_uri;
}

server {
    listen 443 ssl;
    server_name lunawhisp.com www.lunawhisp.com 45.76.182.245;

    ssl_certificate /www/ssl/fullchain.pem;
    ssl_certificate_key /www/ssl/privkey.pem;

    root /www;
    index index.html;

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    # Security: block hidden files
    location ~ /\.\. {
        deny all;
        return 404;
    }

    # Block sensitive directories
    location ~ ^/(backend|docs|tests|data|venv)/ {
        deny all;
        return 404;
    }

    # Admin page → backend dynamic route
    location = /admin.html {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin static resources
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
        expires 7d;
    }

    # 图片资源长期缓存（头像、封面等）
    location ~* \.(png|jpg|jpeg|webp|gif|ico|svg)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API reverse proxy
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式输出必须关闭缓冲（否则 Nginx 会攒着数据一起发）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
